<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brandon Whitman — Principal Solution Consultant | AI Solutions</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Theme tokens ── */
    :root {
      --radius: 14px;
      --transition-theme: background 0.3s, color 0.3s, border-color 0.3s, box-shadow 0.3s;
    }

    [data-theme="dark"] {
      --bg:          #0d0d0f;
      --surface:     #18181b;
      --border:      #27272a;
      --text:        #fafafa;
      --muted:       #a1a1aa;
      --accent:      #c9a84c;
      --accent-dim:  rgba(201, 168, 76, 0.12);
      --glow:        rgba(201, 168, 76, 0.22);
      --shadow:      0 8px 32px rgba(0,0,0,0.5);
      --toggle-bg:   #27272a;
      --toggle-icon: "☀️";
      --footer:      #3f3f46;
    }

    [data-theme="light"] {
      --bg:          #f4f1eb;
      --surface:     #ffffff;
      --border:      #e4e0d8;
      --text:        #1a1a1a;
      --muted:       #71717a;
      --accent:      #a07828;
      --accent-dim:  rgba(160, 120, 40, 0.1);
      --glow:        rgba(160, 120, 40, 0.18);
      --shadow:      0 8px 32px rgba(0,0,0,0.1);
      --toggle-bg:   #e4e0d8;
      --toggle-icon: "🌙";
      --footer:      #a1a1aa;
    }

    /* ── Base ── */
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      transition: var(--transition-theme);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 50% at 50% 20%, var(--accent-dim) 0%, transparent 70%);
      pointer-events: none;
      transition: var(--transition-theme);
    }

    /* ── Entrance animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .anim {
      opacity: 0;
      animation: fadeUp 0.55s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    /* Staggered delays */
    .anim-1  { animation-delay: 0.05s; }
    .anim-2  { animation-delay: 0.15s; }
    .anim-3  { animation-delay: 0.25s; }
    .anim-4  { animation-delay: 0.32s; }
    .anim-5  { animation-delay: 0.39s; }
    .anim-6  { animation-delay: 0.46s; }
    .anim-7  { animation-delay: 0.53s; }
    .anim-8  { animation-delay: 0.60s; }

    /* ── Card ── */
    .card {
      position: relative;
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.5rem 2rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      transition: var(--transition-theme);
      animation: fadeIn 0.4s ease forwards;
    }

    /* ── Theme toggle ── */
    .theme-toggle {
      position: absolute;
      top: 1rem;
      right: 1rem;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--toggle-bg);
      border: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: var(--transition-theme), transform 0.2s;
      z-index: 10;
      line-height: 1;
    }

    .theme-toggle:hover {
      transform: scale(1.12) rotate(15deg);
    }

    .theme-toggle:active {
      transform: scale(0.95);
    }

    /* ── Avatar ── */
    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, #c9a84c 0%, #8b6914 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      font-weight: 700;
      color: #0d0d0f;
      border: 3px solid var(--border);
      flex-shrink: 0;
      font-family: Georgia, serif;
      letter-spacing: 1px;
      transition: var(--transition-theme);
    }

    /* ── Identity ── */
    .identity {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .identity h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .identity .title {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .identity .bio {
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.5;
      margin-top: 0.2rem;
    }

    /* ── Links ── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 0.875rem;
      width: 100%;
      padding: 0.9rem 1.1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition:
        border-color 0.2s,
        background 0.2s,
        transform 0.18s cubic-bezier(0.22, 1, 0.36, 1),
        box-shadow 0.2s;
      box-shadow: 0 0 0 rgba(0,0,0,0);
    }

    .link-btn:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
      transform: translateY(-4px);
      box-shadow: 0 8px 24px var(--glow), 0 2px 8px rgba(0,0,0,0.12);
    }

    .link-btn:active {
      transform: translateY(-1px);
      box-shadow: 0 2px 8px var(--glow);
    }

    .link-icon {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .link-icon.calendar { background: rgba(99,  179, 237, 0.15); }
    .link-icon.linkedin { background: rgba(10,  102, 194, 0.2);  }
    .link-icon.journey  { background: rgba(201, 168, 76,  0.15); }

    .link-text {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }

    .link-label {
      font-weight: 600;
      font-size: 0.875rem;
    }

    .link-sub {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .link-arrow {
      margin-left: auto;
      color: var(--muted);
      font-size: 1rem;
      transition: transform 0.18s, color 0.18s;
    }

    .link-btn:hover .link-arrow {
      color: var(--accent);
      transform: translateX(3px);
    }

    /* ── Divider ── */
    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      transition: var(--transition-theme);
    }

    /* ── AgeOld Guitars branding ── */
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
    }

    .brand-logo {
      width: 180px;
      height: auto;
      opacity: 0.85;
      transition: opacity 0.2s;
      /* In light mode the white logo needs a dark tint so it stays visible */
      filter: none;
    }

    [data-theme="light"] .brand-logo {
      filter: invert(1);   /* white → black on light backgrounds */
      opacity: 0.7;
    }

    .brand-logo:hover {
      opacity: 1;
    }

    /* ── Footer ── */
    footer {
      margin-top: 2rem;
      font-size: 0.72rem;
      color: var(--footer);
      text-align: center;
      transition: color 0.3s;
      animation: fadeIn 0.6s 0.7s ease forwards;
      opacity: 0;
    }
  </style>
</head>
<body>

  <div class="card">

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme" title="Toggle light/dark mode">
      ☀️
    </button>

    <div class="avatar anim anim-1">BW</div>

    <div class="identity anim anim-2">
      <h1>Brandon Whitman</h1>
      <span class="title">Principal Solution Consultant &middot; AI Solutions</span>
      <p class="bio">Solution Architect &nbsp;&middot;&nbsp; Customer Advocate &nbsp;&middot;&nbsp; Musician &nbsp;&middot;&nbsp; Girl-Dad</p>
    </div>

    <div class="links">

      <a class="link-btn anim anim-3" href="https://calendly.com" target="_blank" rel="noopener">
        <span class="link-icon calendar">📅</span>
        <span class="link-text">
          <span class="link-label">Book a Meeting</span>
          <span class="link-sub">Schedule time with me</span>
        </span>
        <span class="link-arrow">›</span>
      </a>

      <a class="link-btn anim anim-4" href="https://www.linkedin.com/in/brandon-whitman-okc/" target="_blank" rel="noopener">
        <span class="link-icon linkedin">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#0a66c2" xmlns="http://www.w3.org/2000/svg">
            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
          </svg>
        </span>
        <span class="link-text">
          <span class="link-label">LinkedIn</span>
          <span class="link-sub">Connect with me</span>
        </span>
        <span class="link-arrow">›</span>
      </a>

      <a class="link-btn anim anim-5" href="https://www.journeylifeokc.com" target="_blank" rel="noopener">
        <span class="link-icon journey">✦</span>
        <span class="link-text">
          <span class="link-label">Journey Life OKC</span>
          <span class="link-sub">journeylifeokc.com</span>
        </span>
        <span class="link-arrow">›</span>
      </a>

    </div>

    <div class="divider anim anim-6"></div>

    <div class="brand anim anim-7">
      <img class="brand-logo" src="ageold-logo.png" alt="AgeOld Guitars — Handcrafted in Oklahoma City" />
    </div>

  </div>

  <footer>brandonwhitman &copy; 2026</footer>

  <script>
    (function () {
      const STORAGE_KEY = 'bw-theme';
      const html = document.documentElement;
      const btn  = document.getElementById('themeToggle');

      // Apply saved preference immediately (before paint)
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) html.setAttribute('data-theme', saved);

      function updateIcon() {
        btn.textContent = html.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';
      }

      updateIcon();

      btn.addEventListener('click', function () {
        const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem(STORAGE_KEY, next);
        updateIcon();
      });
    })();
  </script>

</body>
</html>
